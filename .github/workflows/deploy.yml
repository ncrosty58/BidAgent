name: Deploy

on:
  push:
    branches: [main]

env:
  PATH: /home/nathan/.pyenv/shims:/home/nathan/.pyenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C /opt/bidagent pull

      - name: Run tests
        working-directory: /opt/bidagent
        run: python -m unittest tests.test_bidagent

      - name: Restart bid agent container
        # src/ and skills/ are volume-mounted — no rebuild needed, just restart
        run: docker restart bidagent
