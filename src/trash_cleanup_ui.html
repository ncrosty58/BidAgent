<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Twenty Trash Cleanup</title>
<style>
body{font-family:system-ui,sans-serif;max-width:700px;margin:40px auto;padding:0 20px}
.btn{display:inline-block;padding:12px 24px;background:#b00020;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin:8px}
.btn:hover{opacity:0.9}
.btn:disabled{opacity:0.5;cursor:not-allowed}
pre{background:#f5f5f5;padding:16px;border-radius:6px;overflow-x:auto;white-space:pre-wrap;font-size:13px}
.status{margin:12px 0;padding:10px;border-radius:4px}
.status.working{background:#fff3cd;color:#856404}
.status.done{background:#d4edda;color:#155724}
.status.error{background:#f8d7da;color:#721c24}
</style>
</head>
<body>
<h1>🧹 Twenty Trash Cleanup</h1>
<p>Permanently delete soft-deleted records from Twenty CRM.</p>
<button class="btn" onclick="cleanup('curbclass')" id="btn-cc">🧹 Empty CurbClass</button>
<button class="btn" onclick="cleanup('chassisshield')" id="btn-cs">🧹 Empty ChassisShield</button>
<div id="status" class="status" style="display:none"></div>
<pre id="results">Click a button to run cleanup. Results appear here.</pre>

<script>
async function cleanup(workspace) {
  const btn = document.getElementById('btn-' + (workspace === 'curbclass' ? 'cc' : 'cs'));
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  btn.disabled = true;
  status.style.display = 'block';
  status.className = 'status working';
  status.textContent = 'Working... this may take a moment.';
  results.textContent = 'Processing...';
  try {
    const resp = await fetch('http://bodhi.lab:8343/trash-cleanup/' + workspace, { method: 'POST' });
    const data = await resp.json();
    results.textContent = JSON.stringify(data, null, 2);
    status.className = 'status done';
    status.textContent = data.totalDeleted + ' records deleted, ' + data.totalFailed + ' failed.';
  } catch(e) {
    status.className = 'status error';
    status.textContent = 'Error: ' + e.message;
    results.textContent = '';
  }
  btn.disabled = false;
}
</script>
<p style="color:#666;font-size:12px;margin-top:40px">
  API: <code>POST http://bodhi.lab:8343/trash-cleanup/curbclass</code>
  — Systemd service on port 8343
</p>
</body>
</html>
