# BidAgent Skill: Curb Class
# Defines services, pricing, image rules, and prompts for curb class
# exterior home refresh estimating.
#
# Service names here MUST match the names in Twenty CRM (services object)
# for cross-referencing. If CRM has a service without matching pricing here,
# the basePrice string will be used as a fallback hint.

name: curbclass
version: "2.3"
description: "Curb Class — premium exterior home refresh. Driveways, landscaping, hardware, and complete entryway transformation."

services:
  Driveway & Concrete Deep Clean:
    display: "Driveway & Concrete Deep Clean"
    category: "Restoration"
    brackets:
      - name: small_2_car
        label: "Small (2-car driveway)"
        low: 150
      - name: medium_4_car
        label: "Medium (4-car/wide driveway)"
        low: 250
      - name: large_circular
        label: "Large (circular/long driveway)"
        low: 400

  Low-Pressure House Wash:
    display: "Low-Pressure House Wash"
    category: "Cleaning"
    brackets:
      - name: townhome_1_story
        label: "Townhome / 1-story"
        low: 200
      - name: suburban_2_story
        label: "Suburban 2-story"
        low: 350
      - name: estate_large
        label: "Large estate"
        low: 600

  Exterior Wood & Railing Repair:
    display: "Exterior Wood & Railing Repair"
    category: "Repairs"
    brackets:
      - name: minor
        label: "Minor (1-2 areas)"
        low: 200
      - name: moderate
        label: "Moderate (3-5 areas)"
        low: 400
      - name: extensive
        label: "Extensive (full porch/stoop)"
        low: 700

  Front Door & Accent Painting:
    display: "Front Door & Accent Painting"
    category: "Aesthetics"
    flat_rate:
      low: 180

  Bush Trimming & Dark Mulching:
    display: "Bush Trimming & Dark Mulching"
    category: "Landscaping"
    brackets:
      - name: small_beds
        label: "Small beds"
        low: 100
      - name: medium_beds
        label: "Medium beds"
        low: 220
      - name: full_property
        label: "Full property"
        low: 500

  Premium Curb Class Hardware Bundle:
    display: "Premium Curb Class Hardware Bundle"
    category: "Hardware"
    flat_rate:
      low: 400

image_rules:
  min_photos: 1
  max_photos: 10
  allowed_formats:
    - image/jpeg
    - image/png
    - image/webp

validation:
  photo_quality_check: true
  content_check: true
  climate_check: true

prompts:
  system: |
    You are BidAgent, an automated AI assessment tool for Curb Class.
    Your job is to provide non-binding AI cost assessments for budget planning.
    Classify property exterior photos into size/cost brackets with high consistency.
    Strictly enforce logic mapping based on clear physical visual evidence.
    Be realistic, conservative, and align strictly with the matching guidelines.
    If the photos are clearly not a home exterior, reject with explanation.

  image_check: |
    You are a BidAgent image validator. Analyze the provided exterior property photos.

    - Check photo quality: are they clear, well-lit, and usable for estimating?
      If blurry, too dark, obstructed, or obviously not a real property, mark as inappropriate.
    - Check content: are these exterior property photos (house, driveway, yard, entryway)?
      If they are unrelated (people, pets, interiors, screenshots, text documents, etc.), mark as inappropriate.

    Respond with ONLY a JSON object: {"appropriate": true/false, "reason": "explanation if not appropriate"}

  quote: |
    For each requested service, assess the work required from the photos and determine the appropriate base estimate. Then, apply a +20% markup across the entire scale (multiply your dynamic assessment by 1.2) so that all prices, whether at baseline or adjusted upward for condition, are consistently 20% higher.

    Use these standard baselines as your starting reference point (the baseline remains the starting point for clean properties, but the final output should be 1.2x the baseline):

    1. Driveway & Concrete Deep Clean:
       - small_2_car: Baseline $150 (Output: $180)
       - medium_4_car: Baseline $250 (Output: $300)
       - large_circular: Baseline $400 (Output: $480)
       - Work scaling: Evaluate size and condition (such as oil staining or heavy organic growth). Estimate the base cost for this level of effort, then scale the entire result up by 20% (+20% markup).

    2. Low-Pressure House Wash:
       - townhome_1_story: Baseline $200 (Output: $240)
       - suburban_2_story: Baseline $350 (Output: $420)
       - estate_large: Baseline $600 (Output: $720)
       - Work scaling: Assess height, multi-level complexity, and mildew buildup. Estimate the base cost for this level of effort, then scale the entire result up by 20% (+20% markup).

    3. Exterior Wood & Railing Repair:
       - minor: Baseline $200 (Output: $240)
       - moderate: Baseline $400 (Output: $480)
       - extensive: Baseline $700 (Output: $840)
       - Work scaling: Assess deterioration severity. Estimate the base cost for this level of effort, then scale the entire result up by 20% (+20% markup).

    4. Front Door & Accent Painting:
       - flat_rate: Baseline $180 (Output: $216)
       - Work scaling: Assess accent painting scope (such as front door, shutters, or columns). Estimate the base cost for this level of effort, then scale the entire result up by 20% (+20% markup).

    5. Bush Trimming & Dark Mulching:
       - small_beds: Baseline $100 (Output: $120)
       - medium_beds: Baseline $220 (Output: $264)
       - full_property: Baseline $500 (Output: $600)
       - Work scaling: Assess overgrowth density and mulch volume requirements. Estimate the base cost for this level of effort, then scale the entire result up by 20% (+20% markup).

    6. Premium Curb Class Hardware Bundle:
       - flat_rate: Baseline $400 (Output: $480)
       - Work scaling: Estimate the base cost, then scale the entire result up by 20% (+20% markup).

    Ensure you analyze the property photos to identify size/condition. Calculate a specific single estimated price for the work (which MUST be at least the +20% marked-up starting rate for the classified bracket and dynamically scaled upwards depending on the required effort). Determine the bracket name matching the workload.
    Generate an extremely concise (1 sentence, max 15 words) job description explaining what needs to be done. Do NOT include any price numbers or cost references in this description.

    For the overall response, produce TWO distinct summaries:

    - "description": A customer-facing blurb of exactly 2-3 sentences. Write this for the homeowner. Start with a one-sentence description of their home and what you see in the photos. Then 1-2 sentences listing the requested services as an AI assessment — make it clear this is a preliminary AI cost assessment for budget planning. No pricing talk.

    - "contractor_notes": An internal brief for the contractor/crew (1 paragraph, 3-5 sentences). Clinical, detail-oriented tone. Describe what the job actually entails on the ground — size/scope/condition observations from the photos, any tricky areas noted, and why the pricing came out the way it did.

    CRITICAL: Ensure the response is valid, well-formed JSON. Do not include raw newlines inside any string property values (escape them as \n instead). Avoid using double quotes inside string values (use single quotes instead if needed).

    Respond with ONLY a JSON object:
    {
      "itemized_quote": [
        {
          "service": "concrete_clean",
          "bracket": "medium_4_car",
          "label": "Driveway & Concrete Deep Clean",
          "description": "4-car driveway with moderate dirt buildup requiring thorough pressure washing.",
          "price": 300,
          "price_low": 300,
          "price_high": 300
        }
      ],
      "description": "Customer-facing summary here — 3-4 sentences, starts with home description.",
      "contractor_notes": "Internal crew brief — clinical, detail-oriented, 3-5 sentences covering scope, observations, and pricing rationale.",
      "total": 1250,
      "total_low": 1250,
      "total_high": 1250,
      "warnings": [],
      "rejection": null
    }

    If you cannot estimate any of the requested services, return rejection with an explanation.

settings:
  currency: "USD"
  typical_timeline_days: "1-3"
  travel_fee: 0
  minimum_estimate: 150
